<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Student Productivity</title>
    <link rel="stylesheet" href="style.css" />

    <style>
      .auth-wrapper {
        max-width: 400px;
        margin: 100px auto;
        background: white;
        padding: 40px;
        border-radius: 20px;
        border: 1px solid #ddd;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      }

      .auth-wrapper h1 {
        font-size: 28px;
        margin-bottom: 10px;
      }

      .auth-wrapper p {
        color: #777;
        margin-bottom: 25px;
      }

      .auth-form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      .auth-form input {
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      .auth-form input:focus {
        outline: none;
        border-color: #5a4bff;
      }

      .switch {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
      }

      .switch a {
        color: #5a4bff;
        text-decoration: none;
        font-weight: 500;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="auth-wrapper">
      <h1>Student FlashCard WebApp</h1>
      <p id="authTitle">Create your account</p>

      <!-- LOGIN FORM -->
      <form class="auth-form hidden" id="loginForm">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />

        <button class="add-btn">Let's go!</button>
      </form>

      <!-- SIGNUP FORM -->
      <form class="auth-form" id="signupForm">
        <input
          type="text"
          id="fullName"
          name="fullName"
          placeholder="Full Name"
          required
        />
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Email"
          required
        />
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Password"
          required
        />

        <button class="add-btn">Let's go!</button>
      </form>

      <div class="switch">
        <span id="switchText">Don't have an account?</span>
        <a href="#" id="toggleAuth">Login</a>
      </div>
    </div>

    <script src="register.js"></script>
  </body>
</html>
