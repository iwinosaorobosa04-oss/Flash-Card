<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Student Productivity</title>
<link rel="stylesheet" href="style.css">

<style>

.auth-wrapper{
  max-width:400px;
  margin:100px auto;
  background:white;
  padding:40px;
  border-radius:20px;
  border:1px solid #ddd;
  box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.auth-wrapper h1{
  font-size:28px;
  margin-bottom:10px;
}

.auth-wrapper p{
  color:#777;
  margin-bottom:25px;
}

.auth-form{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.auth-form input{
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
}

.auth-form input:focus{
  outline:none;
  border-color:#5a4bff;
}

.switch{
  text-align:center;
  margin-top:15px;
  font-size:14px;
}

.switch a{
  color:#5a4bff;
  text-decoration:none;
  font-weight:500;
}

.hidden{
  display:none;
}

</style>
</head>

<body>

<div class="auth-wrapper">

<h1>Student Productivity</h1>
<p id="authTitle">Login to continue studying</p>

<!-- LOGIN FORM -->
<form class="auth-form" id="loginForm">

<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>

<button class="add-btn"><a href="dashboard.html"></a>Login</button>

</form>

<!-- SIGNUP FORM -->
<form class="auth-form hidden" id="signupForm">

<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>

<button class="add-btn">Create Account</button>

</form>

<div class="switch">
<span id="switchText">Don't have an account?</span>
<a href="#" id="toggleAuth">Sign up</a>
</div>

</div>

<script>

const toggle = document.getElementById("toggleAuth");
const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");
const switchText = document.getElementById("switchText");
const authTitle = document.getElementById("authTitle");

let loginMode = true;

toggle.addEventListener("click", function(e){
e.preventDefault();

if(loginMode){

loginForm.classList.add("hidden");
signupForm.classList.remove("hidden");

authTitle.textContent = "Create your account";
switchText.textContent = "Already have an account?";
toggle.textContent = "Login";

}else{

signupForm.classList.add("hidden");
loginForm.classList.remove("hidden");

authTitle.textContent = "Login to continue studying";
switchText.textContent = "Don't have an account?";
toggle.textContent = "Sign up";

}

loginMode = !loginMode;

});

</script>

</body>
</html>
